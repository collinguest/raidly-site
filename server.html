<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raidly - Data Driven Train System</title>

<link rel="stylesheet" href="assets/styles.css">

<style>
.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px;
}

.train-system {
  display: flex;
  flex-direction: column;
  gap: 30px;
}

/* TRAIN ROW */
.train-row {
  position: relative;
  height: 70px;
  background: #0f1016;
  border-radius: 10px;
  padding: 10px;
  overflow: hidden;
}

/* TRACK */
.track {
  position: absolute;
  top: 50%;
  left: 10px;
  right: 10px;
  height: 2px;
  background: #222;
  transform: translateY(-50%);
}

/* TRAIN */
.train {
  position: absolute;
  top: 50%;
  width: 40px;
  height: 20px;
  border-radius: 20px;
  background: linear-gradient(135deg, #00e5ff, #b9a7ff);
  transform: translateY(-50%);
  box-shadow: 0 0 15px rgba(0,229,255,0.6);
  transition: 0.6s ease;
}

/* LABEL */
.label {
  position: absolute;
  top: 5px;
  left: 10px;
  font-size: 12px;
  color: #aaa;
}

/* STATUS */
.status {
  position: absolute;
  right: 10px;
  top: 5px;
  font-size: 11px;
  padding: 3px 6px;
  border-radius: 5px;
}

.installed {
  background: #00e5ff;
  color: black;
}

.not-installed {
  background: #444;
  color: white;
}
</style>
</head>

<body>

<div class="container">

  <h1>Raidly Live Train Network</h1>

  <div class="card">
    <h3>Server Driven System</h3>
    <p>Each server generates its own live raid train</p>
  </div>

  <div class="train-system" id="system"></div>

</div>

<script>

// REAL SERVER DATA (source of truth)
const servers = [
  { name: "Gaming Hub", installed: true },
  { name: "Streamer Lounge", installed: false },
  { name: "Community Server", installed: true },
  { name: "Esports Network", installed: true },
  { name: "Chill Zone", installed: false }
];

// TRANSFORM INTO TRAINS
let trains = servers.map((s, i) => ({
  name: s.name,
  installed: s.installed,
  index: Math.floor(Math.random() * 6)
}));

const system = document.getElementById("system");

// BUILD UI
function renderTrains() {
  system.innerHTML = "";

  trains.forEach((t, i) => {

    const row = document.createElement("div");
    row.className = "train-row";

    const statusClass = t.installed ? "installed" : "not-installed";
    const statusText = t.installed ? "Installed" : "Not Installed";

    row.innerHTML = `
      <div class="label">${t.name}</div>
      <div class="status ${statusClass}">${statusText}</div>
      <div class="track"></div>
      <div class="train" id="train-${i}"></div>
    `;

    system.appendChild(row);
  });
}

// MOVE TRAINS BASED ON DATA
function moveTrains() {
  const rows = document.querySelectorAll(".train-row");

  trains.forEach((t, i) => {
    const train = document.getElementById("train-" + i);

    const rowWidth = rows[i].offsetWidth - 50;
    const step = rowWidth / 6;

    // different speed logic based on install status
    const speed = t.installed ? 1 : 2;

    t.index += speed;

    if (t.index >= 6) {
      t.index = 0;
    }

    train.style.left = (t.index * step + 10) + "px";
  });
}

// INIT
renderTrains();

// LOOP
setInterval(() => {
  moveTrains();
}, 1200);

</script>

</body>
</html>
