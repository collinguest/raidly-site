<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raidly Server - Auto Backup System</title>

<link rel="stylesheet" href="assets/styles.css">

<style>
.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px;
}

.slots {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.slot {
  background: #14151a;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #222;
  text-align: center;
}

.tag {
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 6px;
  display: inline-block;
  margin-bottom: 6px;
}

.main {
  background: #00e5ff;
  color: black;
}

.backup {
  background: #b9a7ff;
  color: black;
}

.empty {
  background: #444;
  color: white;
}

.activity {
  margin-top: 20px;
  max-height: 150px;
  overflow: hidden;
}
</style>
</head>

<body>

<div class="container">

  <h1 id="serverName">Raid Train Control</h1>

  <div class="card">
    <h3>Auto Backup System</h3>
    <p>Backups automatically fill empty main slots</p>
  </div>

  <div class="card" style="margin-top:20px;">
    <h3>Raid Slots</h3>
    <div class="slots" id="slots"></div>
  </div>

  <div class="card" style="margin-top:20px;">
    <h3>Live Activity</h3>
    <div class="activity" id="activity"></div>
  </div>

</div>

<script>

// SLOT DATA
let slots = [
  { main: "StreamerA", backup: "Viewer1" },
  { main: "", backup: "StreamerB" },
  { main: "StreamerC", backup: "Viewer2" },
  { main: "", backup: "" },
  { main: "", backup: "" },
  { main: "", backup: "" }
];

const container = document.getElementById("slots");
const activity = document.getElementById("activity");

// render UI
function renderSlots() {
  container.innerHTML = "";

  slots.forEach((slot, i) => {
    const div = document.createElement("div");
    div.className = "slot";

    div.innerHTML = `
      <h4>Slot ${i + 1}</h4>

      <div class="tag main">
        Main: ${slot.main || "Empty"}
      </div><br>

      <div class="tag backup">
        Backup: ${slot.backup || "Empty"}
      </div>
    `;

    container.appendChild(div);
  });
}

// AUTO-FILL LOGIC
function autoFillBackups() {
  let changed = false;

  for (let i = 0; i < slots.length; i++) {
    const slot = slots[i];

    if (!slot.main && slot.backup) {
      slot.main = slot.backup;
      slot.backup = "";
      changed = true;

      log(`Backup promoted → Slot ${i + 1}`);
    }
  }

  if (changed) {
    renderSlots();
  }
}

// activity log
function log(text) {
  const line = document.createElement("div");
  line.innerText = text;

  activity.prepend(line);

  if (activity.children.length > 6) {
    activity.removeChild(activity.lastChild);
  }
}

// simulate system changes (demo behavior)
function simulateBackupFlow() {
  const emptySlots = slots.filter(s => !s.main && s.backup);

  if (emptySlots.length === 0) return;

  const index = slots.findIndex(s => !s.main && s.backup);

  if (index !== -1) {
    log("Backup waiting in slot " + (index + 1));
  }
}

// INIT
renderSlots();
simulateBackupFlow();

// RUN AUTO SYSTEM
setInterval(() => {
  autoFillBackups();
  simulateBackupFlow();
}, 3000);

</script>

</body>
</html>
