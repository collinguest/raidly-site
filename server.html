<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raidly Server - Raid Train Animation</title>

<link rel="stylesheet" href="assets/styles.css">

<style>
.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px;
}

.slots {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.slot {
  background: #14151a;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #222;
  text-align: center;
  transition: 0.3s;
}

/* ACTIVE TRAIN SLOT */
.active {
  border: 2px solid #00e5ff;
  box-shadow: 0 0 15px rgba(0,229,255,0.4);
  transform: scale(1.05);
}

.tag {
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 6px;
  display: inline-block;
  margin-bottom: 6px;
}

.main {
  background: #00e5ff;
  color: black;
}

.backup {
  background: #b9a7ff;
  color: black;
}

.activity {
  margin-top: 20px;
  max-height: 150px;
  overflow: hidden;
}
</style>
</head>

<body>

<div class="container">

  <h1>Raid Train Control</h1>

  <div class="card">
    <h3>Live Raid Train</h3>
    <p>Watch the train move through slots automatically</p>
  </div>

  <div class="card" style="margin-top:20px;">
    <h3>Slots</h3>
    <div class="slots" id="slots"></div>
  </div>

  <div class="card" style="margin-top:20px;">
    <h3>Activity Feed</h3>
    <div id="activity"></div>
  </div>

</div>

<script>

// RAID TRAIN DATA
let slots = [
  { main: "StreamerA", backup: "Viewer1" },
  { main: "StreamerB", backup: "Viewer2" },
  { main: "StreamerC", backup: "" },
  { main: "", backup: "StreamerD" },
  { main: "", backup: "" },
  { main: "", backup: "" }
];

let activeIndex = 0;

const container = document.getElementById("slots");
const activity = document.getElementById("activity");

// RENDER SLOTS
function renderSlots() {
  container.innerHTML = "";

  slots.forEach((slot, i) => {
    const div = document.createElement("div");
    div.className = "slot";

    if (i === activeIndex) {
      div.classList.add("active");
    }

    div.innerHTML = `
      <h4>Slot ${i + 1}</h4>

      <div class="tag main">
        Main: ${slot.main || "Empty"}
      </div><br>

      <div class="tag backup">
        Backup: ${slot.backup || "Empty"}
      </div>
    `;

    container.appendChild(div);
  });
}

// TRAIN MOVEMENT
function moveTrain() {
  activeIndex++;

  if (activeIndex >= slots.length) {
    activeIndex = 0;
    log("🚂 Raid train loop restarted");
  } else {
    log("➡ Train moved to slot " + (activeIndex + 1));
  }

  renderSlots();
}

// ACTIVITY LOG
function log(text) {
  const line = document.createElement("div");
  line.innerText = text;

  activity.prepend(line);

  if (activity.children.length > 6) {
    activity.removeChild(activity.lastChild);
  }
}

// AUTO BACKUP PROMOTION (kept simple)
function autoFill() {
  for (let i = 0; i < slots.length; i++) {
    if (!slots[i].main && slots[i].backup) {
      slots[i].main = slots[i].backup;
      slots[i].backup = "";
      log("🔁 Backup promoted in slot " + (i + 1));
    }
  }
}

// INIT
renderSlots();

// LOOP SYSTEM (THIS IS THE MAGIC)
setInterval(() => {
  autoFill();
  moveTrain();
}, 3000);

</script>

</body>
</html>
