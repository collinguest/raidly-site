<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raidly Server - Raid Train Control</title>

<link rel="stylesheet" href="assets/styles.css">

<style>
.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px;
}

.slots {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.slot {
  background: #14151a;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #222;
  text-align: center;
}

.slot h4 {
  margin: 0 0 10px 0;
}

.tag {
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 6px;
  display: inline-block;
  margin-bottom: 8px;
}

.main {
  background: #00e5ff;
  color: black;
}

.backup {
  background: #b9a7ff;
  color: black;
}

.empty {
  background: #444;
  color: white;
}

.activity {
  margin-top: 20px;
  max-height: 150px;
  overflow: hidden;
}
</style>
</head>

<body>

<div class="container">

  <!-- TITLE -->
  <h1 id="serverName">Loading...</h1>

  <!-- STATUS -->
  <div class="card">
    <h3>Raid Train System</h3>
    <p>Active Train: 1</p>
    <p>Backups Enabled: ✔</p>
  </div>

  <!-- SLOTS -->
  <div class="card" style="margin-top:20px;">
    <h3>Raid Slots (Main + Backup System)</h3>
    <div class="slots" id="slots"></div>
  </div>

  <!-- CONTROLS -->
  <div class="card" style="margin-top:20px;">
    <h3>Controls</h3>
    <button class="btn primary" onclick="startTrain()">Start Train</button>
    <button class="btn" onclick="resetTrain()">Reset Train</button>
  </div>

  <!-- ACTIVITY -->
  <div class="card" style="margin-top:20px;">
    <h3>Live Activity</h3>
    <div class="activity" id="activity"></div>
  </div>

</div>

<script>
// server name
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if (name) {
  document.getElementById("serverName").innerText = name;
}

// SLOT DATA (main + backup system)
let slots = [
  { main: "StreamerA", backup: "Viewer1" },
  { main: "", backup: "StreamerB" },
  { main: "StreamerC", backup: "" },
  { main: "", backup: "" },
  { main: "", backup: "" },
  { main: "", backup: "" }
];

const container = document.getElementById("slots");

// render slots
function renderSlots() {
  container.innerHTML = "";

  slots.forEach((slot, index) => {
    const div = document.createElement("div");
    div.className = "slot";

    let mainStatus = slot.main ? slot.main : "Empty";
    let backupStatus = slot.backup ? slot.backup : "Empty";

    div.innerHTML = `
      <h4>Slot ${index + 1}</h4>

      <div class="tag main">Main: ${mainStatus}</div><br>
      <div class="tag backup">Backup: ${backupStatus}</div><br>

      ${slot.main === "" && slot.backup !== "" ? `
        <button class="btn primary" onclick="takeSlot(${index})">
          Take Main Slot
        </button>
      ` : ""}
    `;

    container.appendChild(div);
  });
}

// take slot from backup
function takeSlot(index) {
  if (slots[index].main === "" && slots[index].backup !== "") {
    slots[index].main = slots[index].backup;
    slots[index].backup = "";
    addActivity("Backup promoted to main in slot " + (index + 1));
    renderSlots();
  }
}

// start train
function startTrain() {
  addActivity("New raid train started");
}

// reset
function resetTrain() {
  slots = slots.map(() => ({ main: "", backup: "" }));
  addActivity("Train reset");
  renderSlots();
}

// activity
const activityContainer = document.getElementById("activity");

function addActivity(text) {
  const line = document.createElement("div");
  line.innerText = text;

  activityContainer.prepend(line);

  if (activityContainer.children.length > 6) {
    activityContainer.removeChild(activityContainer.lastChild);
  }
}

// init
renderSlots();
</script>

</body>
</html>
