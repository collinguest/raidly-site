<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raidly Server - Guided Tour</title>

<link rel="stylesheet" href="assets/styles.css">

<style>
.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px;
}

/* TRAIN SYSTEM */
.train-system {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
}

.train-row {
  position: relative;
  height: 70px;
  background: #14151a;
  border-radius: 12px;
  padding: 10px;
  border: 1px solid #23242b;
  overflow: hidden;
}

.track {
  position: absolute;
  top: 50%;
  left: 10px;
  right: 10px;
  height: 2px;
  background: #222;
}

.train {
  position: absolute;
  top: 50%;
  width: 38px;
  height: 18px;
  border-radius: 20px;
  background: linear-gradient(135deg, #00e5ff, #b9a7ff);
  transform: translateY(-50%);
  transition: 0.5s ease;
  box-shadow: 0 0 12px rgba(0,229,255,0.4);
}

.label {
  font-size: 12px;
  color: #aaa;
}

/* TOUR SYSTEM */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  z-index: 999;
}

.highlight {
  position: relative;
  z-index: 1000;
  box-shadow: 0 0 0 3px #00e5ff, 0 0 25px rgba(0,229,255,0.3);
  border-radius: 12px;
}

.tooltip {
  position: fixed;
  background: #14151a;
  border: 1px solid #2a2b33;
  padding: 14px;
  border-radius: 12px;
  max-width: 260px;
  color: #fff;
  z-index: 1001;
}
</style>
</head>

<body>

<div id="overlay"></div>

<div class="container">

  <h1 id="title">Server Control Panel</h1>

  <div class="card" id="statusCard">
    <h3>System Status</h3>
    <p>All raid systems operational</p>
  </div>

  <h3 id="trainTitle">Train Network</h3>

  <div class="train-system" id="system"></div>

  <button class="btn" onclick="startTour()" style="margin-top:20px;">
    Replay Tour
  </button>

</div>

<script>

/* =========================
   TRAIN SYSTEM
========================= */

let trains = [
  { name: "Gaming Hub Train", index: 0 },
  { name: "Streamer Lounge Train", index: 2 },
  { name: "Community Train", index: 4 }
];

const system = document.getElementById("system");

function render() {
  system.innerHTML = "";

  trains.forEach((t, i) => {

    const row = document.createElement("div");
    row.className = "train-row";

    row.innerHTML = `
      <div class="label">${t.name}</div>
      <div class="track"></div>
      <div class="train" id="train-${i}"></div>
    `;

    system.appendChild(row);
  });
}

function move() {
  const rows = document.querySelectorAll(".train-row");

  trains.forEach((t, i) => {
    const el = document.getElementById("train-" + i);

    const width = rows[i].offsetWidth - 50;
    const step = width / 6;

    t.index = (t.index + 1) % 6;

    el.style.left = (t.index * step + 10) + "px";
  });
}

render();
setInterval(move, 1200);

/* =========================
   SERVER TOUR SYSTEM
========================= */

const steps = [
  {
    el: "#title",
    text: "This is your server control panel — where raid trains are managed."
  },
  {
    el: "#statusCard",
    text: "This shows the health of your raid system in real time."
  },
  {
    el: "#trainTitle",
    text: "This is your raid train network — each row is a live train."
  },
  {
    el: ".train-system",
    text: "Each train moves automatically across its route."
  }
];

let stepIndex = 0;

const overlay = document.getElementById("overlay");

function startTour() {
  stepIndex = 0;
  overlay.style.display = "block";
  showStep();
}

function showStep() {

  clearHighlights();

  if (stepIndex >= steps.length) {
    endTour();
    return;
  }

  const step = steps[stepIndex];
  const el = document.querySelector(step.el);

  if (!el) return;

  el.classList.add("highlight");

  const rect = el.getBoundingClientRect();

  const tooltip = document.createElement("div");
  tooltip.className = "tooltip";

  tooltip.innerHTML = `
    <div>${step.text}</div>
    <button class="btn primary" onclick="nextStep()">Next</button>
  `;

  document.body.appendChild(tooltip);

  tooltip.style.top = (rect.bottom + 10) + "px";
  tooltip.style.left = rect.left + "px";
}

function nextStep() {
  document.querySelectorAll(".tooltip").forEach(t => t.remove());
  stepIndex++;
  showStep();
}

function clearHighlights() {
  document.querySelectorAll(".highlight").forEach(el => {
    el.classList.remove("highlight");
  });
}

function endTour() {
  overlay.style.display = "none";
  clearHighlights();
  document.querySelectorAll(".tooltip").forEach(t => t.remove());

  localStorage.setItem("raidly_server_tour_done", "true");
}

/* AUTO START FIRST TIME */
if (!localStorage.getItem("raidly_server_tour_done")) {
  setTimeout(startTour, 800);
}

</script>

</body>
</html>
