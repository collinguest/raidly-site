<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raidly Server - Moving Train</title>

<link rel="stylesheet" href="assets/styles.css">

<style>
.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px;
  position: relative;
}

.slots {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 15px;
  margin-top: 40px;
  position: relative;
}

/* SLOT BOX */
.slot {
  background: #14151a;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #222;
  text-align: center;
  position: relative;
}

/* TRAIN INDICATOR */
.train {
  position: absolute;
  top: -25px;
  width: 40px;
  height: 20px;
  background: linear-gradient(135deg, #00e5ff, #b9a7ff);
  border-radius: 20px;
  transition: 0.5s ease;
  box-shadow: 0 0 15px rgba(0,229,255,0.6);
}

/* small rail line */
.track {
  position: absolute;
  top: 10px;
  left: 0;
  right: 0;
  height: 2px;
  background: #222;
  z-index: -1;
}

.activity {
  margin-top: 20px;
  max-height: 150px;
  overflow: hidden;
}
</style>
</head>

<body>

<div class="container">

  <h1>Raid Train Control</h1>

  <div class="card">
    <h3>Live Moving Raid Train</h3>
    <p>The train physically moves across slots</p>
  </div>

  <!-- TRAIN AREA -->
  <div class="slots" id="slots">

    <div class="track"></div>
    <div class="train" id="train"></div>

  </div>

  <div class="card" style="margin-top:20px;">
    <h3>Activity Feed</h3>
    <div id="activity"></div>
  </div>

</div>

<script>

let slots = new Array(6).fill(null).map((_, i) => ({
  main: "Streamer " + (i + 1),
  backup: "Backup " + (i + 1)
}));

const train = document.getElementById("train");
const activity = document.getElementById("activity");

let index = 0;

// POSITION TRAIN OVER SLOT
function moveTrainVisual() {
  const slotWidth = document.querySelector(".slots").offsetWidth / 6;

  train.style.left = (index * slotWidth + slotWidth / 2 - 20) + "px";

  log("🚂 Train moved to slot " + (index + 1));

  index++;

  if (index >= slots.length) {
    index = 0;
    log("🔁 Train loop restarted");
  }
}

// ACTIVITY FEED
function log(text) {
  const div = document.createElement("div");
  div.innerText = text;

  activity.prepend(div);

  if (activity.children.length > 6) {
    activity.removeChild(activity.lastChild);
  }
}

// INIT POSITION
setTimeout(() => {
  moveTrainVisual();
}, 500);

// LOOP
setInterval(() => {
  moveTrainVisual();
}, 2500);

</script>

</body>
</html>
