<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raidly Server</title>

<link rel="stylesheet" href="assets/styles.css">
<script src="assets/data.js"></script>
</head>

<body>

<div class="app-shell">

  <div class="sidebar">
    <div class="logo">Raidly</div>

    <a href="dashboard.html">Dashboard</a>
    <a href="#">Trains</a>
    <a href="#">Backups</a>
    <a href="#">Settings</a>
  </div>

  <div class="main">

    <h2 id="title">Server</h2>
    <p>Raid Train Control Panel</p>

    <div class="card">
      <h3>Live System Status</h3>
      <p>All systems operational</p>
    </div>

    <h3 style="margin-top:20px;">Train Network</h3>

    <div class="train-system" id="system"></div>

  </div>

</div>

<style>
.train-system {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.train-row {
  position: relative;
  height: 70px;
  background: #14151a;
  border-radius: 12px;
  padding: 10px;
  border: 1px solid #23242b;
  overflow: hidden;
}

.track {
  position: absolute;
  top: 50%;
  left: 10px;
  right: 10px;
  height: 2px;
  background: #222;
}

.train {
  position: absolute;
  top: 50%;
  width: 38px;
  height: 18px;
  border-radius: 20px;
  background: linear-gradient(135deg, #00e5ff, #b9a7ff);
  transform: translateY(-50%);
  transition: 0.5s ease;
  box-shadow: 0 0 12px rgba(0,229,255,0.4);
}

.label {
  font-size: 12px;
  color: #aaa;
}
</style>

<script>

const params = new URLSearchParams(window.location.search);
const name = params.get("name");

document.getElementById("title").innerText = name || "Server";

let trains = SERVER_DATA.map((s, i) => ({
  name: s.name,
  index: Math.floor(Math.random() * 6)
}));

const system = document.getElementById("system");

function render() {
  system.innerHTML = "";

  trains.forEach((t, i) => {
    const row = document.createElement("div");
    row.className = "train-row";

    row.innerHTML = `
      <div class="label">${t.name}</div>
      <div class="track"></div>
      <div class="train" id="train-${i}"></div>
    `;

    system.appendChild(row);
  });
}

function move() {
  const rows = document.querySelectorAll(".train-row");

  trains.forEach((t, i) => {
    const el = document.getElementById("train-" + i);

    const width = rows[i].offsetWidth - 50;
    const step = width / 6;

    t.index = (t.index + 1) % 6;

    el.style.left = (t.index * step + 10) + "px";
  });
}

render();
setInterval(move, 1200);

</script>

</body>
</html>
