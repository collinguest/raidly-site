<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raidly Dashboard</title>

<link rel="stylesheet" href="assets/styles.css">

<style>
.container {
  display: flex;
  min-height: 100vh;
}

/* sidebar */
.sidebar {
  width: 220px;
  background: #0f1016;
  padding: 20px;
}

.logo {
  color: #b9a7ff;
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 30px;
}

.nav a {
  display: block;
  margin: 10px 0;
  color: #aaa;
  text-decoration: none;
}

.nav a:hover {
  color: #00e5ff;
}

/* main */
.main {
  flex: 1;
  padding: 30px;
}

/* header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

/* grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

/* avatar */
.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #222;
}
</style>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">Raidly</div>

    <div class="nav">
      <a href="#">Dashboard</a>
      <a href="#">Servers</a>
      <a href="#">Billing</a>
      <a href="#">Settings</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- HEADER -->
    <div class="header">
      <h2>Dashboard</h2>

      <div style="display:flex; align-items:center; gap:10px;">
        <div class="avatar"></div>
        <span>Demo User</span>
      </div>
    </div>

    <!-- STATS -->
    <div class="card" style="margin-bottom:20px;">
      <h3>Network Stats</h3>
      <p>Active Raid Trains: 3</p>
      <p>Streamers Live: 12</p>
      <p>Total Viewers Moving: 187</p>
    </div>

    <!-- SERVERS -->
    <div class="grid" id="servers"></div>

  </div>

</div>

<!-- SCRIPT -->
<script>
const servers = [
  { name: "Gaming Hub", installed: true },
  { name: "Streamer Lounge", installed: false },
  { name: "Community Server", installed: true }
];

const container = document.getElementById("servers");

servers.forEach(server => {
  const card = document.createElement("div");
  card.className = "card";

  const statusClass = server.installed ? "installed" : "not-installed";
  const statusText = server.installed ? "Installed ✔" : "Not Installed";
  const buttonText = server.installed ? "Reinstall" : "Install Raidly";

  card.innerHTML = `
    <h3>${server.name}</h3>
    <div class="badge ${statusClass}">${statusText}</div>

    <a class="btn primary"
      href="https://discord.com/oauth2/authorize?client_id=1464326736660398403&permissions=17601045031953&scope=bot%20applications.commands">
      ${buttonText}
    </a>
  `;

  container.appendChild(card);
});
</script>

</body>
</html>
