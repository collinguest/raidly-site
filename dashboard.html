<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raidly Dashboard</title>

<style>

body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0c10;
  color:white;
}

/* layout */
.container {
  display:flex;
  min-height:100vh;
}

/* sidebar */
.sidebar {
  width:240px;
  background:#0f1016;
  padding:20px;
  border-right:1px solid #1c1d22;
}

.logo {
  color:#b9a7ff;
  font-weight:bold;
  font-size:18px;
  margin-bottom:30px;
}

.nav a {
  display:block;
  color:#00e5ff;
  text-decoration:none;
  margin:12px 0;
  padding:8px;
  border-radius:8px;
}

.nav a:hover {
  background:rgba(0,229,255,0.08);
}

/* main */
.main {
  flex:1;
  padding:40px;
}

/* top header */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.user {
  color:#aaa;
  font-size:14px;
}

/* servers grid */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:15px;
}

/* server card */
.card {
  background:#14151a;
  padding:20px;
  border-radius:12px;
  border:1px solid #222;
}

.card h3 {
  margin:0;
  color:#00e5ff;
}

/* tier badges */
.badge {
  display:inline-block;
  margin-top:10px;
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
}

.free { background:#444; }
.tier1 { background:#00e5ff; color:black; }
.tier2 { background:#b9a7ff; color:black; }
.tier3 { background:#ffcc00; color:black; }

/* button */
.btn {
  display:inline-block;
  margin-top:15px;
  padding:10px;
  background:#00e5ff;
  color:black;
  text-decoration:none;
  border-radius:8px;
  text-align:center;
}

.btn:hover {
  opacity:0.85;
}

</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">Raidly</div>

<div class="nav">
<a href="#">Dashboard</a>
<a href="#">Servers</a>
<a href="#">Billing</a>
<a href="#">Settings</a>
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<h2>Dashboard</h2>
<div class="user">Logged in as: Discord User</div>
</div>

<!-- SERVER LIST -->
<div class="grid">

<div class="card">
<h3>Gaming Hub</h3>
<div class="badge tier2">Tier 2</div>
<a class="btn" href="#">Install Raidly</a>
</div>

<div class="card">
<h3>Streamer Lounge</h3>
<div class="badge tier1">Tier 1</div>
<a class="btn" href="#">Install Raidly</a>
</div>

<div class="card">
<h3>New Server</h3>
<div class="badge free">Free</div>
<a class="btn" href="#">Install Raidly</a>
</div>

</div>

</div>

</div>

</body>
</html>
