<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raidly Dashboard</title>

<link rel="stylesheet" href="assets/styles.css">

<style>
.container {
  display: flex;
  min-height: 100vh;
}

/* sidebar */
.sidebar {
  width: 220px;
  background: #0f1016;
  padding: 20px;
}

.logo {
  color: #b9a7ff;
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 30px;
}

.nav a {
  display: block;
  margin: 10px 0;
  color: #aaa;
  text-decoration: none;
}

.nav a:hover {
  color: #00e5ff;
}

/* main */
.main {
  flex: 1;
  padding: 30px;
}

/* header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

/* grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

/* avatar */
.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #222;
}
</style>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">Raidly</div>

    <div class="nav">
      <a href="#">Dashboard</a>
      <a href="#">Servers</a>
      <a href="#">Billing</a>
      <a href="#">Settings</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- HEADER -->
    <div class="header">
      <h2>Dashboard</h2>

      <div style="display:flex; align-items:center; gap:10px;">
        <div class="avatar"></div>
        <span>Demo User</span>
      </div>
    </div>

    <!-- STATS -->
    <div class="card" style="margin-bottom:20px;">
      <h3>Network Stats</h3>
      <p>Active Raid Trains: 3</p>
      <p>Streamers Live: 12</p>
      <p>Total Viewers Moving: 187</p>
    </div>

    <!-- SERVERS -->
    <div class="grid">

      <div class="card">
        <h3>Gaming Hub</h3>
        <div class="badge free">Free</div>
        <a class="btn primary"
           href="https://discord.com/oauth2/authorize?client_id=1464326736660398403&permissions=17601045031953&scope=bot%20applications.commands">
          Install Raidly
        </a>
      </div>

      <div class="card">
        <h3>Streamer Lounge</h3>
        <div class="badge free">Free</div>
        <a class="btn primary"
           href="https://discord.com/oauth2/authorize?client_id=1464326736660398403&permissions=17601045031953&scope=bot%20applications.commands">
          Install Raidly
        </a>
      </div>

      <div class="card">
        <h3>Community Server</h3>
        <div class="badge free">Free</div>
        <a class="btn primary"
           href="https://discord.com/oauth2/authorize?client_id=1464326736660398403&permissions=17601045031953&scope=bot%20applications.commands">
          Install Raidly
        </a>
      </div>

    </div>

  </div>

</div>

</body>
</html>
