<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raidly Dashboard</title>

<link rel="stylesheet" href="assets/styles.css">
<script src="assets/data.js"></script>
</head>

<body>

<div class="app-shell">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">Raidly</div>

    <a href="#">Overview</a>
    <a href="#">Servers</a>
    <a href="#">Billing</a>
    <a href="#">Settings</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>Overview</h2>
    <p>Manage your raid infrastructure across all servers</p>

    <div class="card" style="margin: 20px 0;">
      <h3>Network Health</h3>
      <p>Active Raid Trains: 3</p>
      <p>Live Streamers: 12</p>
      <p>Viewer Flow: Stable</p>
    </div>

    <h3>Servers</h3>

    <div class="grid" id="servers"></div>

  </div>

</div>

<script>

const container = document.getElementById("servers");

SERVER_DATA.forEach(s => {

  const card = document.createElement("div");
  card.className = "card";

  const status = s.installed ? "installed" : "not-installed";
  const text = s.installed ? "Active" : "Not Installed";

  card.innerHTML = `
    <h3>${s.name}</h3>
    <p>Raid system status</p>
    <div class="badge ${status}">${text}</div><br><br>
    <button class="btn primary">Open Server</button>
  `;

  card.onclick = () => {
    window.location.href = "server.html?name=" + encodeURIComponent(s.name);
  };

  container.appendChild(card);
});

</script>

</body>
</html>
