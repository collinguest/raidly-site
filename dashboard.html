<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raidly Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0c10;
  color: white;
}

/* layout */
.container {
  display: flex;
  min-height: 100vh;
}

/* sidebar */
.sidebar {
  width: 240px;
  background: #0f1016;
  padding: 20px;
  border-right: 1px solid #1c1d22;
}

.logo {
  color: #b9a7ff;
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 30px;
}

.nav a {
  display: block;
  color: #00e5ff;
  text-decoration: none;
  margin: 12px 0;
  padding: 8px;
  border-radius: 8px;
}

.nav a:hover {
  background: rgba(0,229,255,0.08);
}

/* main */
.main {
  flex: 1;
  padding: 40px;
}

/* header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

.user {
  color: #aaa;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #222;
}

/* grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 15px;
}

/* card */
.card {
  background: #14151a;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #222;
}

.card h3 {
  margin: 0;
  color: #00e5ff;
}

/* badge */
.badge {
  display: inline-block;
  margin-top: 10px;
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 12px;
}

.free { background: #444; }

/* button */
.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 10px;
  background: #00e5ff;
  color: black;
  text-decoration: none;
  border-radius: 8px;
  text-align: center;
}

.btn:hover {
  opacity: 0.85;
}
</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">Raidly</div>

  <div class="nav">
    <a href="#">Dashboard</a>
    <a href="#">Servers</a>
    <a href="#">Billing</a>
    <a href="#">Settings</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">
    <h2>Dashboard</h2>

    <div class="user">
      <img id="avatar" class="avatar" src="">
      <span id="username">Loading user...</span>
    </div>
  </div>

  <!-- SERVER GRID -->
  <div class="grid" id="servers"></div>

</div>

</div>

<!-- SCRIPT -->
<script>
const params = new URLSearchParams(window.location.search);

const username = params.get("username");
const avatar = params.get("avatar");
const id = params.get("id");
const guilds = params.get("guilds");

// USER INFO
if (username) {
  document.getElementById("username").innerText = username;
}

// AVATAR
if (avatar && id) {
  document.getElementById("avatar").src =
    `https://cdn.discordapp.com/avatars/${id}/${avatar}.png`;
} else {
  document.getElementById("avatar").style.display = "none";
}

// SERVERS
if (guilds) {
  try {
    const data = JSON.parse(decodeURIComponent(guilds));
    const container = document.getElementById("servers");

    data.forEach(server => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h3>${server.name}</h3>
        <div class="badge free">Server</div>
        <a class="btn" href="#">Install Raidly</a>
      `;

      container.appendChild(card);
    });

  } catch (e) {
    console.log("Guild parse error", e);
  }
}
</script>

</body>
</html>
