<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raidly Dashboard</title>

<link rel="stylesheet" href="assets/styles.css">
<script src="assets/data.js"></script>
<script src="assets/auth.js"></script>
</head>

<body>

<script>
// GATEKEEP
if (!AUTH.isLoggedIn()) {
  window.location.href = "onboarding.html";
}
</script>

<div class="app-shell">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="logo">Raidly</div>

    <a href="#">Overview</a>
    <a href="#">Servers</a>
    <a href="#">Billing</a>
    <a href="#">Settings</a>

    <hr style="border:0;border-top:1px solid #222;margin:15px 0;">

    <a href="#" onclick="logout()">Logout</a>

  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>Welcome back, <span id="userName"></span></h2>

    <div class="card" style="margin: 20px 0;">
      <h3>Network Status</h3>
      <p>Everything is running smoothly</p>
    </div>

    <h3>Servers</h3>
    <div class="grid" id="servers"></div>

  </div>

</div>

<script>

const user = AUTH.getUser();
document.getElementById("userName").innerText = user?.name || "User";

function logout() {
  AUTH.logout();
  window.location.href = "onboarding.html";
}

const container = document.getElementById("servers");

SERVER_DATA.forEach(s => {

  const card = document.createElement("div");
  card.className = "card";

  const status = s.installed ? "installed" : "not-installed";
  const text = s.installed ? "Active" : "Not Installed";

  card.innerHTML = `
    <h3>${s.name}</h3>
    <div class="badge ${status}">${text}</div>
  `;

  card.onclick = () => {
    window.location.href = "server.html?name=" + encodeURIComponent(s.name);
  };

  container.appendChild(card);
});

</script>

</body>
</html>
