<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raidly Connecting...</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0c10;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  text-align:center;
}

.loader {
  width:70px;
  height:70px;
  border:4px solid rgba(255,255,255,0.1);
  border-top:4px solid #b9a7ff;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:0 auto 25px;
}

@keyframes spin {
  0% { transform:rotate(0deg); }
  100% { transform:rotate(360deg); }
}

h1 {
  color:#b9a7ff;
  font-size:26px;
}

p {
  color:#aaa;
  font-size:14px;
  margin-top:10px;
}

.dot {
  color:#00e5ff;
  margin-top:15px;
  font-size:13px;
  animation:blink 1.2s infinite;
}

@keyframes blink {
  0% { opacity:0.3; }
  50% { opacity:1; }
  100% { opacity:0.3; }
}
</style>
</head>

<body>

<div class="container">

<div class="loader"></div>

<h1>Connecting your Discord account</h1>

<p>Verifying identity and loading your Raidly dashboard</p>

<div class="dot">Synchronising servers...</div>

</div>

<script>
setTimeout(() => {
  window.location.href = "/dashboard.html";
}, 2500);
</script>

</body>
</html>
